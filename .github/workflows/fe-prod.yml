on:
  push:
    paths:
      - 'fe/**'
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }} 
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            set -e

            export NVM_DIR="/root/.nvm"
            . "$NVM_DIR/nvm.sh"
            nvm use 23.11.0

            cd ${{ secrets.APP_DIR }}
            git pull origin main
            cd fe
            npm ci
            npm run build


